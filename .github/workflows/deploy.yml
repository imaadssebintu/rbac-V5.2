name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || '22' }}
          # Prevent host key checking issues on first connection
          script_stop: true
          script: |
            set -e

            echo "=== Pulling latest code ==="
            cd ~/voya-app || git clone https://github.com/${{ github.repository }} ~/voya-app && cd ~/voya-app
            git pull origin main

            echo "=== Create .env file with latest secrets ==="
            cat > .env << ENVEOF
# Generated by deploy workflow - always overwritten on deploy
DB_PASSWORD=${{ secrets.DB_PASSWORD }}
JWT_SECRET=${{ secrets.JWT_SECRET }}
ENVEOF

            echo "=== Build and start containers ==="
            docker compose down || true
            docker compose build --no-cache
            docker compose up -d

            echo "=== Cleaning up old images ==="
            docker image prune -f

            echo "=== Deploy complete! ==="
