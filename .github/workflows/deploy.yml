name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        env:
          REACT_APP_API_URL: /api
        run: |
          cd frontend
          npm run build

      - name: Copy built frontend to public/
        run: |
          rm -rf public
          mkdir -p public
          cp -r frontend/build/* public/

      - name: Package project (exclude node_modules, .git, .env)
        run: |
          tar czf /tmp/voya-app.tar.gz \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='*/node_modules' \
            .
          mv /tmp/voya-app.tar.gz ./

      - name: Upload package to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: "voya-app.tar.gz"
          target: "/tmp/"
          strip_components: 0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -e

            echo "=== Extract code ==="
            mkdir -p ~/voya-app
            tar xzf /tmp/voya-app.tar.gz -C ~/voya-app/
            rm -f /tmp/voya-app.tar.gz
            cd ~/voya-app

            echo "=== Create .env file with latest secrets ==="
            cat > .env << 'ENVEOF'
            # Generated by deploy workflow - always overwritten on deploy
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            ENVEOF

            echo "=== Build and start containers ==="
            docker compose down || true
            docker compose build
            docker compose up -d

            echo "=== Cleaning up old images ==="
            docker image prune -f

            echo "=== Deploy complete! ==="
